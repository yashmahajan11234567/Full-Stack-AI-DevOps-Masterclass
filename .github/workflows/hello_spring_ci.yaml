name: Hello springboot App to Docker

on:
    push:
       

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:

            - name: checkout code
              uses: actions/checkout@v4

            - name: setup JDK
              uses: actions/setup-java@v5
              with:
                    distribution: 'temurin' # See 'Supported distributions' for available options
                    java-version: '21'

            - name: Build and Test(maven)
              working-directory: Devops/app1-hello/springboot/hello-spring 
              run: mvn -B clean verify

            - name: Upload Test Reports
              uses: actions/upload-artifact@v4
              with:
                    name: test-reports

                    path: Devops/app1-hello/springboot/hello-spring/target/surefire-reports


    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test
        steps:

            - name: checkout code
              uses: actions/checkout@v4

            - name: setup JDK
              uses: actions/setup-java@v5
              with:
                    distribution: 'temurin' # See 'Supported distributions' for available options
                    java-version: '21'

            - name: Build JAR for Docker
              working-directory: Devops/app1-hello/springboot/hello-spring 
              run: mvn -B clean package -DskipTests

            - name: Login to DockerHub
              uses: docker/login-action@v4
              with:
                    username: ${{ secrets.DOCKER_USERNAME }}
                    password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                    context: Devops/app1-hello/springboot/hello-spring
                    push: true
                    tags: |
                      ${{ secrets.DOCKER_USERNAME }}/hello-spring:latest
                      ${{ secrets.DOCKER_USERNAME }}/hello-spring:${{ github.sha }}
                      ${{ secrets.DOCKER_USERNAME }}/hello-spring:${{ github.ref_name }}

                      


