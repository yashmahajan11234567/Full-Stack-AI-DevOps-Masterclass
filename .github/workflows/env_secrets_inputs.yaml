name: Demo CI Env Secrets

on:
  push:
  # workflow_dispatch

env:
  GLOBAL_APP_ENV: global_dev

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JOB_APP_ENV: job_dev

    steps:
      - name: Say Hello
        run: echo "Hello, world!"

      - name: install
        env:
          APP_ENV: dev
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: echo "Environment $APP_ENV using $DB_PASSWORD, $GLOBAL_APP_ENV, $JOB_APP_ENV"

      - name: create demo files
        run: |
          echo "Hello from CI pipeline" > demo.txt
          echo "File created successfully" > demo2.txt

      - name: upload demo
        uses: actions/upload-artifact@v4
        with:
          name: demo-artifact
          path: .