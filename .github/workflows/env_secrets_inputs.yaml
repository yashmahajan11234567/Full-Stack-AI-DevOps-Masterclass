name: Demo CI Env Secrets

on:
    push:
    # workflow_dispatch   

env:
    GLOBAL_APP_ENV: global_dev
    

jobs:
    build:
        runs-on: ubuntu-latest
        env:
             JOB_APP_ENV: job_dev
        steps:

            - name: Say Hello
              run: echo Hello, world!

            - name: install
              env:
                APP_ENV: dev
                DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
              run: echo "Environment $APP_ENV using $DB_PASSWORD, $GLOBAL_APP_ENV, $JOB_APP_ENV"
